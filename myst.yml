version: 1
project:
  title: Faiz Ahmad | Physics & FusionAI ML
  authors:
    - name: Faiz Ahmad
  copyright: '2026'
  exclude:
    - _build
    - Thumbs.db
    - .DS_Store
    - '**.ipynb_checkpoints'
    - generate_rss.py
    - inject_comments.py
    - rss.xml
    - atom.xml
    - CONDUCT.md
    - CONTRIBUTING.md
    - README.md
  github: albertfaiz/Faiz
  thebe:
    binder:
      repo: albertfaiz/Faiz
      provider: github
      url: https://mybinder.org
      ref: main
  bibliography:
    - pages/references.bib
  toc:
    - file: index.md
      title: Home
    - title: Portfolio & Work
      children:
        - file: pages/research.md
        - file: pages/experience.md
site:
  options:
    logo: logo.png
    logo_dark: logo.png
    favicon: fav.ico
    folders: true
    style: custom.css
  actions:
    - title: LinkedIn
      url: https://linkedin.com/in/your-profile-here # Update with your actual URL
    - title: GitHub
      url: https://github.com/albertfaiz
  template: book-theme
